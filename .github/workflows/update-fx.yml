name: update-fx

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install packages
        run: npm install
        working-directory: functions   # ← 이 줄 반드시 필요

      - name: Run FX script
        run: node index.js
        working-directory: functions   # ← 이 줄도 반드시 필요

      - name: Commit JSON
        run: |
          git config --global user.name "fx-bot"
          git config --global user.email "bot@example.com"
          git add public/fx_phil7641.json
          git commit -m "auto update fx" || echo "no changes"
          git push
